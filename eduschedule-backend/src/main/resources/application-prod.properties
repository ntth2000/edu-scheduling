# Production profile — activated when SPRING_PROFILES_ACTIVE=prod
# Self-contained: in the prod Docker image, application.properties is NOT
# present (gitignored), so this file must define everything the app needs.

spring.application.name=eduschedule-backend

# Server
server.port=${PORT:8080}
spring.web.error.include-stacktrace=never
spring.web.error.include-message=always

# Database — all values injected via env vars on Render
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA — Flyway manages schema; Hibernate only validates
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway — run migrations on startup
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# baseline-on-migrate=true so that if the target DB already has tables
# (e.g. imported from dev), Flyway creates its history table at baseline
# version without failing.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS (comma-separated list of allowed origins)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Default admin account (created on first boot by DataInitializer)
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD}

# Logging — keep INFO during initial deploy to surface startup errors.
# Lower to WARN later once stable.
logging.level.root=INFO
logging.level.com.eduschedule=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.jdbc=DEBUG
logging.level.com.zaxxer.hikari=DEBUG
logging.level.org.flywaydb=DEBUG

# Disable devtools in prod (defensive — devtools is runtime-scoped)
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# HikariCP — tuned for Neon serverless (auto-suspend) on Render free (512MB)
# Keep pool small; drop idle connections fast so Neon can suspend.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.keepalive-time=0
spring.datasource.hikari.initialization-fail-timeout=60000

# Actuator — expose only health for Render probes
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
